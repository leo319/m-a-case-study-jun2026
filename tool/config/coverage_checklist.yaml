# ✏️ EDITABLE INPUT · scope: deal-agnostic (applies to every deal) · edit to change what research must cover.
# Deal-agnostic coverage checklist (PLAN.md §1 "Comprehensiveness", §3 stage 3, §3b).
# Lives in the tool, NOT in any deal_spec — so blind spots are visible across deals.
# Drawn from the financial-services dd-checklist workstreams + the tail-risk areas in
# PLAN.md §78-79. Research covers these areas; the coverage map reports searched/hits/gaps.
#
# Per area:
#   key               stable id; claims are tagged with this in claims.jsonl `area`
#   lens              which expert(s) the area feeds: fundamentals | rationale | tailrisk
#   default           required | recommended | optional  (drives gap flagging in the coverage map)
#   subtopics         what "covered" means for this area
#   canonical_sources the standard sources an analyst would always check for this area, even if
#                     nobody named them. Stage 2 (source-plan) proposes the ones that fit the deal;
#                     `cli.py coverage-checklist` prints them. This is the single home for that
#                     list — the source-plan skill reads it rather than carrying its own copy.

areas:
  - key: target_fundamentals
    title: Target fundamentals
    lens: [fundamentals]
    default: required
    # Includes the company-profile depth both companies need for the brief/memo (the
    # research stage runs a dedicated profile pass; see research/SKILL.md): segment-level
    # revenue mix and each side's stated strategy, not just headline financials.
    subtopics: [revenue trend, operating margin, organic growth, customer retention, cash flow, segment revenue mix ($ and %), strategy & geographic footprint]
    canonical_sources: [target 10-K + latest 10-Q, earnings releases (8-K Ex-99)]

  - key: commercial_market
    title: Commercial & market
    lens: [fundamentals, rationale]
    default: recommended
    subtopics: [market size / TAM, market structure (number of national players vs the regional long tail), competitive positioning, pricing power, customer concentration, precedent transactions (last ~10y, incl. announced-but-failed — value, rationale, regulatory/macro outcome)]
    canonical_sources: [both companies' 10-K "Competition" sections, industry / analyst market overviews, comparable consolidations (prior roll-ups / spin-offs / rebuffed approaches)]

  - key: deal_rationale_synergies
    title: Deal rationale & synergies
    lens: [rationale]
    default: required
    # Mirrors the case brief 1a (strategic logic + financial rationale + synergy credibility).
    subtopics: [deal type & strategic drivers, premium vs unaffected price, consideration structure, accretion/dilution, synergies vs premium, synergy credibility/basis]
    canonical_sources: [deal press release, 424B3 "Background of the Merger" + "Opinion of the Financial Advisor" (premium / comparables / precedent transactions / DCF / accretion view), target's unaffected pre-announcement share price (for the premium)]

  - key: financing_balance_sheet
    title: Financing & balance sheet
    lens: [rationale, tailrisk]
    default: required
    subtopics: [pro-forma leverage, debt, deal financing, liquidity]
    canonical_sources: [merger proxy financing section, acquirer debt 8-K, rating-agency actions]

  - key: merger_agreement
    title: Merger agreement & deal protections
    lens: [rationale, tailrisk]
    default: required
    # Feeds the close-likelihood force balance (expert §7) and risk allocation (memo §4 Deal structure).
    subtopics: [closing conditions, MAC / MAE clause, termination fees (both sides) & reverse break fee, deal protections (no-shop / go-shop / matching rights), regulatory-efforts covenant (e.g. hell-or-high-water / divestiture commitment), financing condition & specific performance, outside / drop-dead date]
    canonical_sources: [the merger agreement (annex to the merger proxy / 424B3 / 8-K exhibit) — its "The Merger Agreement" summary covering conditions / termination & break-fee / MAC / regulatory-efforts covenant]

  - key: antitrust_regulatory
    title: Antitrust & regulatory
    lens: [tailrisk]
    default: required
    subtopics: [market concentration, HSR / DOJ / FTC, sector regulators, approval risk, precedent antitrust outcomes (how prior deals in the sector cleared / were challenged)]
    canonical_sources: [merger proxy "Regulatory Approvals", DOJ/FTC press releases, news on second requests]

  - key: litigation_legal
    title: Litigation & legal
    lens: [tailrisk]
    default: required
    subtopics: [material litigation, legal proceedings, contracts, IP disputes]
    canonical_sources: [10-K "Legal Proceedings", court dockets (CourtListener), litigation news]

  - key: management_governance
    title: Management & governance
    lens: [tailrisk]
    default: recommended
    subtopics: [management quality, governance/shareholder controversies, key-person risk]
    canonical_sources: [DEF 14A proxy, executive/board news, leadership-change coverage]

  - key: short_activist
    title: Short-seller / activist
    lens: [tailrisk]
    default: recommended
    subtopics: [bear theses, short reports, activist campaigns]
    canonical_sources: [Seeking Alpha, short-seller reports (e.g. Hindenburg / Muddy Waters), 13D activist filings]

  - key: macro_geopolitical
    title: Macro & geopolitical
    lens: [tailrisk]
    default: optional
    subtopics: [macro exposure, FX, tariffs, geopolitical risk]
    canonical_sources: [10-K risk factors (FX / tariffs), macro / sector commentary]

  - key: operational_integration
    title: Operational & integration
    lens: [rationale, tailrisk]
    default: recommended
    subtopics: [integration/execution risk, IT systems, supply chain, facilities, workforce/people & culture integration (retention, sales-force & route overlap, key-person), customer retention/attrition through integration]
    canonical_sources: [both companies' 10-Ks (facilities / IT / supply chain), integration commentary in the deal materials]

  - key: esg_environmental
    title: ESG / environmental
    lens: [tailrisk]
    default: optional
    subtopics: [environmental liabilities, regulatory compliance history, ESG risks]
    canonical_sources: [10-K environmental disclosures, ESG-rating / controversy coverage]
